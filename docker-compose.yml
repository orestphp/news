version: '3.8'

volumes:
  db-data:

networks:
  news-network:
    driver: bridge

services:
  # php(app)
  app:
    build:
      context: ./docker/php
    volumes:
      - ./app:/var/www/news/app
    networks:
      - news-network

  # nginx
  nginx:
    build:
      context: ./docker/nginx
    ports:
      - '8080:80'
    volumes:
      - ./app:/var/www/news/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - news-network

  # MySQL
  db:
    build:
      context: .
      dockerfile: docker/mysql/Dockerfile
      args:
        MYSQL_DATABASE: news
        MYSQL_USER: user
        MYSQL_PASSWORD: user
        MYSQL_ROOT_PASSWORD: root
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - news-network
      
  #phpmyadmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: pma
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    restart: always
    ports:
      - 8081:80
    depends_on:
      - db
    networks:
      - news-network

  #phpredisadmin
  phpredisadmin:
    container_name: redis-admin
    depends_on:
      - redis
    image: erikdubbelboer/phpredisadmin
    environment:
      - REDIS_1_HOST=redis
      - REDIS_1_PORT=6379
    ports:
      - "83:80"
    networks:
      - news-network

  #redis
  redis:
    image: redis:alpine
    container_name: redis-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      retries: 3
      timeout: 5s
    networks:
      - news-network
